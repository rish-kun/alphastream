# ============================================================
# Infrastructure Only — PostgreSQL + Redis
# ============================================================
# Use this when running the application locally (backend,
# pipeline, and frontend started as native processes) but you
# want the database and cache running in Docker.
#
# Usage:
#   docker compose -f docker-compose.infra.yml up -d
#   docker compose -f docker-compose.infra.yml down
#
# Host-mapped ports:
#   Postgres  -> localhost:5433
#   Redis     -> localhost:6380
#
# Production Resource Limits (1 CPU, 1.5GB RAM total):
#   - PostgreSQL: 384MB
#   - Redis: 96MB
# ============================================================

services:
  alphastream-postgres:
    image: postgres:16-alpine
    container_name: alphastream-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: alphastream
      # Performance tuning for low memory (384MB)
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    ports:
      - "5433:5432"
    volumes:
      - alphastream_pgdata:/var/lib/postgresql/data
      - ./postgres/postgres.conf:/etc/postgresql/postgresql.conf:ro
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    networks:
      - alphastream
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: '0.30'
          memory: 384M
        reservations:
          cpus: '0.10'
          memory: 128M
    restart: unless-stopped

  alphastream-redis:
    image: redis:7-alpine
    container_name: alphastream-redis
    ports:
      - "6380:6379"
    volumes:
      - alphastream_redisdata:/data
    command: redis-server --maxmemory 64mb --maxmemory-policy allkeys-lru --appendonly yes
    networks:
      - alphastream
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: '0.20'
          memory: 96M
        reservations:
          cpus: '0.05'
          memory: 32M
    restart: unless-stopped

networks:
  alphastream:
    driver: bridge

volumes:
  alphastream_pgdata:
  alphastream_redisdata:
